<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSW Roleplay OS</title>
    <style>
        :root {
            --phone-bg: #fdfae6; /* Cream color from your image */
            --case-color: #ffffff;
            --text-main: #1a331a;
            --accent-gold: #f3a019; /* The orange/gold from your logo */
            --bg-forest: #1b431c; /* Deep green background */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-forest);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Phone Frame */
        .phone-container {
            width: 320px;
            height: 600px;
            background-color: var(--phone-bg);
            border-radius: 40px;
            border: 8px solid var(--case-color);
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Status Bar */
        .status-bar {
            height: 40px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: rgba(0,0,0,0.3);
        }

        .battery-icon {
            width: 25px;
            height: auto;
        }

        /* Screen Area */
        #screen {
            flex-grow: 1;
            padding: 20px;
            position: relative;
        }

        /* App Grid View */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            animation: fadeIn 0.3s ease;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .app-icon:active {
            transform: scale(0.9);
        }

        .app-icon img {
            width: 65px;
            height: 65px;
            border-radius: 15px;
            object-fit: cover;
            background: #000; /* Matching your logo background */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .app-icon span {
            font-size: 10px;
            margin-top: 5px;
            color: var(--text-main);
            text-align: center;
            font-weight: 600;
        }

        /* Individual App Page View */
        .app-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .app-page img {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .app-page h2 {
            margin: 0 0 10px 0;
            color: var(--text-main);
        }

        .app-page p {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .link-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .app-link {
            background-color: var(--accent-gold);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .app-link:hover { opacity: 0.8; }

        /* Home Button */
        .home-button-container {
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .home-circle {
            width: 45px;
            height: 45px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
        }

        .home-circle:active {
            background: rgba(0,0,0,0.05);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="status-bar">
            <div id="clock">11:16 AM</div>
            <img src="https://cdn-icons-png.flaticon.com/512/3103/3103446.png" class="battery-icon" alt="Battery">
        </div>

        <div id="screen">
            </div>

        <div class="home-button-container">
            <div class="home-circle" onclick="renderHome()"></div>
        </div>
    </div>

    <script>
        // 1. YOUR APP DATA (This acts as your JSON)
        const apps = [
            {
                id: 1,
                name: "NSW Roleplay",
                image: "https://i.imgur.com/vHq0G9R.png", // Replace with your uploaded logo
                description: "The premier roleplaying experience. Join our community and start your journey today.",
                links: [
                    { label: "Join Discord", url: "https://discord.gg/example" },
                    { label: "Server Rules", url: "https://example.com/rules" },
                    { label: "Staff Application", url: "https://example.com/apply" }
                ]
            },
            {
                id: 2,
                name: "CAD System",
                image: "https://cdn-icons-png.flaticon.com/512/1067/1067357.png",
                description: "Access the Computer Aided Dispatch. Log in to manage your characters and vehicles.",
                links: [
                    { label: "Open CAD", url: "https://cad.example.com" },
                    { label: "Character Sync", url: "#" }
                ]
            },
            {
                id: 3,
                name: "Settings",
                image: "https://cdn-icons-png.flaticon.com/512/3953/3953226.png",
                description: "Customize your phone interface and notification settings.",
                links: [
                    { label: "UI Theme", url: "#" }
                ]
            }
        ];

        const screen = document.getElementById('screen');

        // 2. CLOCK LOGIC
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 3. RENDER HOME SCREEN
        function renderHome() {
            let html = '<div class="app-grid">';
            apps.forEach(app => {
                html += `
                    <div class="app-icon" onclick="openApp(${app.id})">
                        <img src="${app.image}" alt="${app.name}">
                        <span>${app.name}</span>
                    </div>
                `;
            });
            html += '</div>';
            screen.innerHTML = html;
        }

        // 4. OPEN APP LOGIC
        function openApp(id) {
            const app = apps.find(a => a.id === id);
            if (!app) return;

            let linksHtml = app.links.map(link => 
                `<a href="${link.url}" target="_blank" class="app-link">${link.label}</a>`
            ).join('');

            screen.innerHTML = `
                <div class="app-page">
                    <img src="${app.image}" alt="${app.name}">
                    <h2>${app.name}</h2>
                    <p>${app.description}</p>
                    <div class="link-container">
                        ${linksHtml}
                    </div>
                </div>
            `;
        }

        // Initial Load
        renderHome();
    </script>
</body>
</html>
